<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TradeBoy</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: #8b8b8b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'VT323', monospace;
            margin: 0;
            padding: 20px;
        }
        .gameboy {
            background: #b5b5b5;
            border-radius: 20px;
            box-shadow: 0 10px 0 #5a5a5a;
            padding: 20px 20px 30px;
            max-width: 620px;
            width: 100%;
        }
        .screen {
            background: #9bbc0f;
            border: 5px solid #306230;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            font-family: monospace;
            color: #0f380f;
            font-weight: bold;
            font-size: 13px;
            box-shadow: inset 0 0 5px #306230;
        }
        .balance {
            background: #0f380f;
            color: #9bbc0f;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 15px;
        }
        .positions {
            background: #e0f0d0;
            padding: 8px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .positions table {
            width: 100%;
            border-collapse: collapse;
        }
        .positions th, .positions td {
            text-align: left;
            padding: 4px 2px;
            border-bottom: 1px solid #7c8c5e;
        }
        .log-area {
            background: #0f380f;
            color: #9bbc0f;
            padding: 6px;
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
            margin-bottom: 15px;
            text-align: left;
        }
        .log-area p {
            margin: 2px 0;
            border-bottom: 1px dotted #306230;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 5px;
        }
        button {
            background: #4b4b4b;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 16px;
            border-radius: 50px;
            box-shadow: 0 5px 0 #2a2a2a;
            cursor: pointer;
            transition: 0.05s linear;
            flex: 1;
            letter-spacing: 2px;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2a2a2a;
        }
        button.start { background: #3a7a3a; box-shadow: 0 5px 0 #1e4a1e; }
        button.stop { background: #aa4a4a; box-shadow: 0 5px 0 #6a2a2a; }
        button.force { background: #aa6a2a; box-shadow: 0 5px 0 #6a3a0a; }
        .status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            margin-right: 6px;
        }
        .status.running { background: #2ecc2e; box-shadow: 0 0 5px #2ecc2e; }
        .status.stopped { background: #e74c3c; }
        .refresh-note {
            text-align: center;
            font-size: 10px;
            margin-top: 10px;
            color: #306230;
        }
        /* 自訂模態框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #b5b5b5;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            max-width: 280px;
            font-family: monospace;
            border: 3px solid #306230;
        }
        .modal-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .modal-buttons button {
            font-size: 16px;
            padding: 8px 12px;
            width: 80px;
        }
    </style>
</head>
<body>
<div class="gameboy">
    <div class="screen">
        <div class="balance" id="balanceArea">💰 載入中...</div>
        <div class="positions" id="positionsArea">📋 持倉列表</div>
        <div class="log-area" id="logArea">📜 日誌區域</div>
    </div>
    <div class="controls">
        <button class="start" id="btnStart">▶ 開始</button>
        <button class="stop" id="btnStop">⏹ 停止</button>
        <button class="force" id="btnForce">⛔ 平倉並停止</button>
    </div>
    <div class="refresh-note">
        <span id="statusLed" class="status stopped"></span> 機器人狀態：<span id="runStatus">已停止</span>
    </div>
</div>

<!-- 自訂確認模態框 -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <p id="modalMessage">確定要執行此操作嗎？</p>
        <div class="modal-buttons">
            <button id="modalConfirm">確認</button>
            <button id="modalCancel">取消</button>
        </div>
    </div>
</div>

<script>
    let pendingAction = null;

    function showModal(message, onConfirm) {
        const modal = document.getElementById('confirmModal');
        const msgSpan = document.getElementById('modalMessage');
        msgSpan.innerText = message;
        modal.style.display = 'flex';
        const confirmBtn = document.getElementById('modalConfirm');
        const cancelBtn = document.getElementById('modalCancel');
        const handler = () => {
            modal.style.display = 'none';
            confirmBtn.removeEventListener('click', handler);
            cancelBtn.removeEventListener('click', cancelHandler);
            onConfirm();
        };
        const cancelHandler = () => {
            modal.style.display = 'none';
            confirmBtn.removeEventListener('click', handler);
            cancelBtn.removeEventListener('click', cancelHandler);
        };
        confirmBtn.addEventListener('click', handler);
        cancelBtn.addEventListener('click', cancelHandler);
    }

    function fetchStatus() {
        fetch('/status')
            .then(res => res.json())
            .then(data => {
                const isRunning = data.running;
                const led = document.getElementById('statusLed');
                const statusText = document.getElementById('runStatus');
                if (isRunning) {
                    led.className = 'status running';
                    statusText.innerText = '運行中';
                } else {
                    led.className = 'status stopped';
                    statusText.innerText = '已停止';
                }
                const username = data.username || '未知';
                const total = data.total || 0;
                const available = data.available || 0;
                document.getElementById('balanceArea').innerHTML = `
                    👤 ${username} &nbsp;| 💰 淨資產: $${total.toFixed(2)} &nbsp;| 可用: $${available.toFixed(2)}
                `;
                const positions = data.positions || [];
                if (positions.length === 0) {
                    document.getElementById('positionsArea').innerHTML = '📋 暫無持倉';
                } else {
                    let html = `<table></table><th>股票</th><th>股數</th><th>成本</th><th>現價</th><th>盈虧</th></tr>`;
                    positions.forEach(p => {
                        let priceStr = p.price ? p.price.toFixed(2) : '--';
                        let pnlStr = p.pnl ? p.pnl.toFixed(2) : '0.00';
                        let pnlColor = p.pnl >= 0 ? '#2a6b2a' : '#aa4a4a';
                        html += `<tr>
                            <td>${p.symbol}</td>
                            <td>${p.qty.toFixed(4)}</td>
                            <td>${p.cost.toFixed(2)}</td>
                            <td>${priceStr}</td>
                            <td style="color:${pnlColor}">$${pnlStr}</td>
                        </tr>`;
                    });
                    html += `</table>`;
                    document.getElementById('positionsArea').innerHTML = html;
                }
                const logs = data.logs || [];
                const logDiv = document.getElementById('logArea');
                if (logs.length === 0) {
                    logDiv.innerHTML = '📜 尚無日誌';
                } else {
                    let logHtml = '';
                    logs.slice().reverse().forEach(log => {
                        logHtml += `<p>[${log.time}] ${log.level}: ${log.msg}</p>`;
                    });
                    logDiv.innerHTML = logHtml;
                }
            })
            .catch(err => console.error('獲取狀態失敗', err));
    }

    function sendCommand(endpoint, confirmMsg) {
        if (confirmMsg) {
            showModal(confirmMsg, () => {
                fetch(endpoint, { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        console.log(data);
                        fetchStatus();
                    })
                    .catch(err => alert('命令發送失敗: ' + err));
            });
        } else {
            fetch(endpoint, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    console.log(data);
                    fetchStatus();
                })
                .catch(err => alert('命令發送失敗: ' + err));
        }
    }

    document.getElementById('btnStart').addEventListener('click', () => {
        sendCommand('/start', '確定要啟動機器人嗎？');
    });
    document.getElementById('btnStop').addEventListener('click', () => {
        sendCommand('/stop', '確定要停止機器人嗎？停止不會賣出任何股票，機器人將暫停交易。');
    });
    document.getElementById('btnForce').addEventListener('click', () => {
        sendCommand('/force_stop', '⚠️ 確定要強制平倉所有持倉並停止機器人？此操作不可逆！');
    });

    fetchStatus();
    setInterval(fetchStatus, 3000);
</script>
</body>
</html>
